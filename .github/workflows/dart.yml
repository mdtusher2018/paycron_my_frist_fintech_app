name: Flutter Android Build (Signed APK)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      # 🔐 Decode keystore from GitHub Secrets
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 --decode > keystore.jks

      # 🔐 Create key.properties dynamically
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../keystore.jks" >> android/key.properties

      # 🧱 Build USER APK
      - name: Build User APK
        run: flutter build apk --flavor user --release --dart-define=APP_ROLE=user

      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-release-apk
          path: build/app/outputs/flutter-apk/app-user-release.apk

      # 🧱 Build DRIVER APK
      - name: Build Driver APK
        run: flutter build apk --flavor driver --release --dart-define=APP_ROLE=driver

      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: driver-release-apk
          path: build/app/outputs/flutter-apk/app-driver-release.apk